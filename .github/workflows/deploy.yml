name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      # GitHub Pages ist ein statischer Host: ein Reload auf einer Unterroute
      # wie /settings oder /archiv sucht nach einer echten Datei an diesem
      # Pfad und liefert sonst 404, statt die SPA zu laden, die das Routing
      # erst im Browser übernimmt. 404.html = Kopie von index.html behebt das
      # (Assets sind absolute Pfade unter /mandatscockpit/, funktionieren
      # daher unabhängig vom Tiefen-Pfad); React Router übernimmt danach
      # normal anhand der Browser-URL.
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
